<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yap-Yap</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>Yap-Yap 🗣️</h1>
    <p>are you saying something or just yapping?</p>
  </header>

  <!-- Verdict -->
  <div class="verdict idle" id="verdictWrap">
    <span class="verdict-emoji" id="verdictEmoji">—</span>
    <div class="verdict-label" id="verdictLabel">Waiting...</div>
    <div class="verdict-sub" id="verdictSub">Press Start and say something</div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="wordCount">0</div>
      <div class="stat-label">Words</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="wpmDisplay">0</div>
      <div class="stat-label">WPM</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="yapScore">0%</div>
      <div class="stat-label">Yap Score</div>
    </div>
  </div>

  <!-- WPM meter -->
  <div class="meter">
    <div class="meter-header">
      <span>Speed</span>
      <span id="meterLabel">0 / 160 wpm</span>
    </div>
    <div class="meter-track">
      <div class="meter-fill" id="meterFill"></div>
    </div>
  </div>

  <!-- Transcript -->
  <div class="transcript" id="transcriptWrap">
    <span class="placeholder" id="transcriptText">Your words will appear here...</span>
  </div>

  <!-- Controls -->
  <div class="btn-row">
    <button id="startBtn">🎙 Start</button>
    <button id="resetBtn">Reset</button>
  </div>

  <!-- History -->
  <div class="history-title">Session history</div>
  <div class="history-list" id="historyList">
    <span class="empty-history">No sessions yet</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
